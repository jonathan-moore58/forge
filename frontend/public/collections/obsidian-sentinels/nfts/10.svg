      <path d="M289 191 L294 229 L297 260 L289 320" fill="none" stroke="#06B6D4" stroke-width="1.7" stroke-linecap="round" opacity="0.73"/>
      <path d="M289 320 L271 356" fill="none" stroke="#06B6D4" stroke-width="1.0" stroke-linecap="round" opacity="0.51"/>
      <path d="M213 189 L232 221 L240 254 L232 301" fill="none" stroke="#06B6D4" stroke-width="1.3" stroke-linecap="round" opacity="0.61"/>
      <path d="M232 301 L243 337" fill="none" stroke="#06B6D4" stroke-width="0.8" stroke-linecap="round" opacity="0.43"/>
      
