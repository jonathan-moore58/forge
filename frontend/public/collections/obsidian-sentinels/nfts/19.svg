<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg"><stop offset="0%" stop-color="#120a04"/><stop offset="100%" stop-color="#080604"/></radialGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="40%"><stop offset="0%" stop-color="#16A34A" stop-opacity="0.15"/><stop offset="100%" stop-color="#16A34A" stop-opacity="0"/></radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#0a0a0a"/></linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="auraF"><feGaussianBlur in="SourceGraphic" stdDeviation="10"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="176" r="150" fill="url(#aura)"/>

  <!-- Body -->
  <path d="M214 146 L196 186 L201 336 L226 366 L286 366 L311 336 L316 186 L298 146Z" fill="url(#stone)" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Shoulder pads -->
