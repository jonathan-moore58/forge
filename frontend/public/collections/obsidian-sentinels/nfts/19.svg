  <!-- Eyes -->
  <g fill="#22C55E" filter="url(#glow)">
    <circle cx="238" cy="131" r="7"/>
    <circle cx="274" cy="131" r="7"/>
  </g>
  <g fill="#86EFAC" opacity="0.7">
    <circle cx="238" cy="131" r="7"/>
    <circle cx="274" cy="131" r="7"/>
  </g>

  <!-- Energy veins -->
  <g filter="url(#glow)">
    <!-- Center spine -->
    <path d="M256 146 L254 216 L257 286 L255 326" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.6"/>
    <path d="M272 160 L287 206 L290 265 L295 317 L280 369" fill="none" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round" opacity="0.58"/>
      <path d="M295 154 L311 185 L299 244" fill="none" stroke="#22C55E" stroke-width="1.7" stroke-linecap="round" opacity="0.64"/>
      <path d="M268 142 L254 197 L235 241 L251 297 L246 350" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity="0.76"/>
      
  </g>

  

  <!-- Particles -->
  

  <!-- Ambient glow at feet -->
  <ellipse cx="256" cy="371" rx="70" ry="15" fill="#16A34A" opacity="0.08" filter="url(#auraF)"/>

  <!-- Border ring -->
  <rect x="4" y="4" width="504" height="504" rx="16" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.1"/>
</svg>