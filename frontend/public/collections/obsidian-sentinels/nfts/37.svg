    <radialGradient id="aura" cx="50%" cy="40%" r="40%"><stop offset="0%" stop-color="#0891B2" stop-opacity="0.15"/><stop offset="100%" stop-color="#0891B2" stop-opacity="0"/></radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#0a0a0a"/></linearGradient>
