      <path d="M284 121 L295 177 L297 222 L296 264 L309 313" fill="none" stroke="#FF6B00" stroke-width="1.3" stroke-linecap="round" opacity="0.76"/>
      <path d="M309 313 L319 336" fill="none" stroke="#FF6B00" stroke-width="0.8" stroke-linecap="round" opacity="0.53"/>
      <path d="M183 129 L197 176 L201 229 L185 287" fill="none" stroke="#FF6B00" stroke-width="2.3" stroke-linecap="round" opacity="0.74"/>
      <path d="M185 287 L189 315" fill="none" stroke="#FF6B00" stroke-width="1.4" stroke-linecap="round" opacity="0.52"/>
      
